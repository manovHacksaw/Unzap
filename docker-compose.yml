services:
  compiler:
    build:
      context: ./compiler
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      # Lock CORS to the Next.js dev server in local development.
      # In production, set this to your Vercel URL.
      ALLOWED_ORIGIN: "http://localhost:3000"
    restart: unless-stopped
